name: Twitter Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

concurrency:
  group: twitter-bot-main
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Run bot
        run: npm run start
        env:
          BOT_DRY_RUN: "false"
          BOT_DISABLE_JITTER: "false"
          STATE_BRANCH: state
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TWITTER_1_APP_KEY: ${{ secrets.TWITTER_1_APP_KEY }}
          TWITTER_1_APP_SECRET: ${{ secrets.TWITTER_1_APP_SECRET }}
          TWITTER_1_ACCESS_TOKEN: ${{ secrets.TWITTER_1_ACCESS_TOKEN }}
          TWITTER_1_ACCESS_SECRET: ${{ secrets.TWITTER_1_ACCESS_SECRET }}
          TWITTER_2_APP_KEY: ${{ secrets.TWITTER_2_APP_KEY }}
          TWITTER_2_APP_SECRET: ${{ secrets.TWITTER_2_APP_SECRET }}
          TWITTER_2_ACCESS_TOKEN: ${{ secrets.TWITTER_2_ACCESS_TOKEN }}
          TWITTER_2_ACCESS_SECRET: ${{ secrets.TWITTER_2_ACCESS_SECRET }}
          TWITTER_3_APP_KEY: ${{ secrets.TWITTER_3_APP_KEY }}
          TWITTER_3_APP_SECRET: ${{ secrets.TWITTER_3_APP_SECRET }}
          TWITTER_3_ACCESS_TOKEN: ${{ secrets.TWITTER_3_ACCESS_TOKEN }}
          TWITTER_3_ACCESS_SECRET: ${{ secrets.TWITTER_3_ACCESS_SECRET }}
